name: Deploy UI to Pages

# ── Trigger on pushes that touch the front-end, not the data pipeline. ───────
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:                # Manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup (for D3 in node_modules) ────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 3. Install (only need runtime deps — D3) ──────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Restore graph.json from the last data build ────────────────────
      - name: Restore cached graph data
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: data/graph.json
          key: graph-data-
          restore-keys: graph-data-

      - name: Verify graph.json exists
        run: |
          if [ ! -f data/graph.json ]; then
            echo "::error::No cached graph.json found. Run the 'Build data & deploy to Pages' workflow first."
            exit 1
          fi
          echo "✅ graph.json restored ($(wc -c < data/graph.json) bytes)"

      # ── 5. Assemble deploy artifact ────────────────────────────────────────
      - name: Prepare site directory
        run: |
          mkdir -p _site/data _site/lib
          cp index.html _site/
          cp data/graph.json _site/data/
          cp node_modules/d3/dist/d3.min.js _site/lib/d3.v7.min.js

      # ── 6. Upload & deploy ─────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
